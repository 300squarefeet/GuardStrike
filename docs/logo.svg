<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="GuardStrike logo">
  <defs>
    <linearGradient id="gs-shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gs-bolt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- shield fill -->
  <path d="M100 14 L170 42 V96 C170 138 140 172 100 186 C60 172 30 138 30 96 V42 Z"
        fill="url(#gs-shield)" opacity="0.12"/>
  <!-- shield outline -->
  <path d="M100 14 L170 42 V96 C170 138 140 172 100 186 C60 172 30 138 30 96 V42 Z"
        fill="none" stroke="url(#gs-shield)" stroke-width="7" stroke-linejoin="round"/>
  <!-- lightning strike -->
  <path d="M113 42 L72 106 H97 L86 158 L131 88 H105 Z"
        fill="url(#gs-bolt)" stroke="#0b1220" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
